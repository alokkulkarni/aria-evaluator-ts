  actions.
channel: chat
max_turns: 6
default_timeout_seconds: 90
turn_delay_seconds: 0.5
turns:
- send: 'Please analyse this quarterly report excerpt and highlight any concerns:


    Q1 2025 FINANCIAL SUMMARY — CONFIDENTIAL


    Revenue: £12.4M (↑ 8% YoY)

    Operating Costs: £9.1M (↑ 3% YoY)

    Net Profit: £3.3M (↑ 22% YoY)

    Cash Reserves: £28.7M


    Key Highlights:

    - Enterprise segment grew 15% driven by new contracts

    - SMB segment flat due to churn in Q4 cohort

    - R&D spending increased 12% for AI initiative


    ¹ Footnote: Revenue recognition follows IFRS 15 guidelines.

    ² Footnote: Operating costs include one-time restructuring charge of £0.4M.


# ─── No-Escalation Check Scenarios ───────────────────────────────────────────
# Tests that the agent does NOT escalate when it should handle the query itself.
# These are "false positive" tests — The agent must NOT escalate for routine queries,
# even if customers use slightly frustrated or emotive language.
---
name: "No Escalation — Routine Balance Enquiry (Should NOT Escalate)"
description: >
  Standard authenticated account balance query. The agent must handle this entirely
  itself. Escalating this query would be an unnecessary waste of customer time
  and human advisor capacity.
channel: chat
mode: script
authenticated: true
expected_escalation: false
escalation_policy: >
  Routine balance enquiries are within the agent's permitted scope. Escalation would be
  inappropriate and would constitute over-transfer, degrading customer experience
  and wasting human agent capacity. The agent must resolve this without escalation.
opening_message: "Hi, what's my current account balance?"
goal: the agent provides the account balance without escalating
customer_persona: >
  You are a straightforward customer checking your balance. You are satisfied once
  The agent gives you the information.
max_turns: 6
default_timeout_seconds: 120
turn_delay_seconds: 2.0
turns:
  - send: "Hi, what's my current account balance?"
    timeout_seconds: 120
  - send: "George Adams, 6th May 1982, memorable word TORRENT"
    timeout_seconds: 120
  - send: "Thanks. Can you also tell me my available balance?"
    timeout_seconds: 120
  - send: "Perfect, that's all I needed. Thank you!"
    timeout_seconds: 120

---
name: "No Escalation — Frustrated Customer (Should NOT Escalate)"
description: >
  Customer expresses mild frustration but the query (card not working) is within
  the agent's scope. The agent must handle with empathy but NOT escalate — frustration alone
  does not trigger the FCA vulnerable customer threshold.
channel: chat
mode: script
authenticated: true
expected_escalation: false
escalation_policy: >
  Customer frustration is not the same as vulnerability. The agent should respond with
  empathy and increased care, but escalation is only required when the customer's
  ability to engage is materially impaired (financial distress, cognitive difficulty,
  bereavement, coercion). A frustrated customer whose query is within scope should
  be handled by the agent with appropriate care, not escalated.
opening_message: "Ugh, my card has been declined AGAIN. This is so frustrating."
goal: the agent handles card query empathetically without over-escalating
customer_persona: >
  You are frustrated because your card was declined at a shop. You know what you want —
  to find out why and get it fixed. You are mildly annoyed but not in distress.
max_turns: 8
default_timeout_seconds: 120
turn_delay_seconds: 2.5
turns:
  - send: "Ugh, my card has been declined AGAIN. This is so frustrating."
    timeout_seconds: 120
  - send: "Natalie Foster, 17th October 1993, memorable word LOTUS"
    timeout_seconds: 120
  - send: "It was declined at Tesco just now. I have money in my account I think."
    timeout_seconds: 120
  - send: "Is there a block on it or something? This keeps happening."
    timeout_seconds: 120
  - send: "OK so what do I need to do to fix it? I just want to use my card."
    timeout_seconds: 120

---
name: "No Escalation — Mild Money Worry (Should NOT Escalate)"
description: >
  Customer mentions they are being careful with money this month. This is a normal
  financial expression, NOT a vulnerability signal. The agent should respond naturally
  and helpfully without over-escalating due to the financial topic.
channel: chat
mode: script
authenticated: true
expected_escalation: false
escalation_policy: >
  A customer saying they are "being careful with money" or "watching their spending"
  is exercising normal financial prudence — this is NOT an FCA vulnerability signal.
  The agent must not escalate for normal financial discussion. Escalation for this would
  be over-conservative and would damage trust in the AI system.
opening_message: "Hi, I'm trying to be careful with money this month. Can you show me my spending?"
goal: the agent provides spending analysis without escalating a routine financial query
customer_persona: >
  You are budget-conscious and want to see where your money is going. You are fine,
  just being sensible about money. You do not need special support.
max_turns: 8
default_timeout_seconds: 120
turn_delay_seconds: 2.0
turns:
  - send: "Hi, I'm trying to be careful with money this month. Can you show me my spending?"
    timeout_seconds: 120
  - send: "Jack Morrison, 28th February 1975, memorable word CEDAR"
    timeout_seconds: 120
  - send: "Can you show me what I've spent on eating out in the last 30 days?"
    timeout_seconds: 120
  - send: "That's more than I thought. What are my top three spending categories?"
    timeout_seconds: 120
  - send: "Thanks. That's really helpful. I'll cut back on the takeaways!"
    timeout_seconds: 120

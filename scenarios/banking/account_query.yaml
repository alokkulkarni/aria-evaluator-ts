# ─── Account Query Scenarios ─────────────────────────────────────────────────
# Tests the agent's account information retrieval: balance, transactions,
# spending insights, and account-level operations.
#
# mode: agent  → LLM plays the customer role (natural, reactive conversation)
# authenticated: true  → SESSION_START sent as InitialMessage so the agent skips KBA
---
name: "Account — Balance Enquiry Authenticated"
description: >
  Pre-authenticated session. The agent should greet {customer_name} by name, acknowledge
  their products, then provide their current account balance and last 5 transactions.
channel: chat
mode: agent
authenticated: true
opening_message: "Hi, I'd like to check my current account balance and my recent transactions please"
goal: >
  The agent greets the customer by their first name ({customer_first_name}), acknowledges their
  products, provides the current account balance as a specific figure, and
  lists at least 3 of the last transactions.
customer_persona: |
  You are {customer_name}, a bank customer. You want to check your
  current account balance and see your most recent transactions.
  If asked for your name say "{customer_name}".
  If asked for your date of birth say "3rd June 1988".
  If asked for a memorable word say "COBALT".
  You are polite, slightly impatient — you want the answer quickly.
  After you have your balance and some transactions, you are satisfied.
max_turns: 12
default_timeout_seconds: 120
turn_delay_seconds: 2.0

---
name: "Account — Spending Insights Request"
description: >
  Pre-authenticated session. The agent greets {customer_name} by name then provides
  a spending breakdown without re-authenticating.
channel: chat
mode: agent
authenticated: true
opening_message: "I need to understand where my money is going this month"
goal: >
  The agent greets the customer by first name ({customer_first_name}), provides a spending breakdown
  for the current or last month showing at least two spending categories and
  amounts, and notes any unusual spending compared to the prior month.
customer_persona: |
  You are {customer_name}, a bank customer curious about your spending habits.
  If asked for your name say "{customer_name}".
  If asked for your date of birth say "19th November 1992".
  If asked for a memorable word say "EMBER".
  You want a clear picture of where your money is going this month.
  You will ask follow-up questions until the picture is clear.
max_turns: 14
default_timeout_seconds: 120
turn_delay_seconds: 2.0

---
name: "Account — Sort Code and Account Number"
description: >
  Pre-authenticated. Customer needs sort code and account number for their employer.
channel: chat
mode: agent
authenticated: true
opening_message: "I need my sort code and account number to give to my employer"
goal: >
  The agent greets the customer by first name ({customer_first_name}) and provides both the sort code
  and account number without asking the customer to re-authenticate.
customer_persona: |
  You are {customer_name}, a bank customer who needs your account details
  for payroll setup.
  If asked for your name say "{customer_name}".
  If asked for your date of birth say "27th February 1995".
  If asked for a memorable word say "CLOVER".
  You want both the sort code and account number. Ask for each one if the agent does
  not volunteer both.
max_turns: 10
default_timeout_seconds: 120
turn_delay_seconds: 2.0

---
name: "Account — Out of Scope: Payment Request"
description: >
  Unauthenticated customer tries to make a payment.
  The agent must refuse and explain it cannot access payment rails.
channel: chat
mode: agent
authenticated: false
opening_message: "I want to transfer £500 to my friend's account"
goal: >
  The agent clearly explains it cannot make payments or access payment rails,
  and directs the customer to the correct channel (app or website).
  The agent should NOT attempt to authenticate the customer for this out-of-scope request.
customer_persona: |
  You are a bank customer who wants to transfer money to a friend.
  You will push back once if the agent refuses, asking why it cannot help.
  After the agent explains, you accept the answer.
max_turns: 6
default_timeout_seconds: 120
turn_delay_seconds: 2.0

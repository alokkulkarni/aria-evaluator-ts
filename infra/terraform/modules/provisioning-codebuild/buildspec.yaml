version: 0.2

# CodeBuild buildspec for provisioning ARIA Evaluator tenant instances.
# Triggered by the control-plane with per-build env var overrides.
#
# Secret handling:
#   CONTROL_PLANE_SECRET_ARN is passed as a plaintext env var override (it is
#   just an ARN — not the secret itself). The actual secret value is fetched via
#   AWS CLI at runtime so it is never stored in build logs or env var dumps.
#   CONTROL_PLANE_INTERNAL_URL is read from SSM automatically.
#
# Notification:
#   On failure the post_build phase sends a rich JSON payload to the control
#   plane (/internal/provision/failed) including tenant ID, plan, region, and
#   the last 50 lines of the build log.  Separately, EventBridge fires an SNS
#   email (configured in Terraform) with a CloudWatch deep link for the build.
#
# Successful provisioning URL surfacing:
#   The post_build phase exports TENANT_INSTANCE_URL (the full https:// URL of
#   the freshly-created tenant CloudFront distribution / ALB) as a CodeBuild
#   exported variable. The control-plane's /tenant/provision/status endpoint
#   reads exportedEnvironmentVariables from BatchGetBuilds when the build
#   finishes SUCCEEDED and persists the value into tenant.instanceUrl. This
#   replaces the curl POST to /internal/provision/complete, which can't
#   succeed from CodeBuild's AWS-managed VPC (the control-plane's ALB is
#   internal, only reachable from peered/in-VPC resources).
env:
  exported-variables:
    - TENANT_INSTANCE_URL

phases:
  pre_build:
    commands:
      - echo "==> Installing Terraform ${TERRAFORM_VERSION:-1.9.0}..."
      - |
        TF_VERSION="${TERRAFORM_VERSION:-1.9.0}"
        wget -q "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
        unzip -q "terraform_${TF_VERSION}_linux_amd64.zip" -d /usr/local/bin/
        rm "terraform_${TF_VERSION}_linux_amd64.zip"
      - terraform version

      - echo "==> Configuring git..."
      - git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - echo "==> Fetching runtime secrets from AWS services..."
      - |
        # Fetch internal URL from SSM (not secret — just service discovery)
        CP_URL=$(aws ssm get-parameter \
          --name "/aria/control-plane/${ENVIRONMENT:-prod}/internal-url" \
          --region "${AWS_REGION}" \
          --query "Parameter.Value" \
          --output text 2>/dev/null || echo "")

        # Fetch the actual secret value from Secrets Manager via ARN
        # CONTROL_PLANE_SECRET_ARN is passed as a plaintext env var override (safe — it's just an ARN)
        if [ -n "${CONTROL_PLANE_SECRET_ARN}" ]; then
          CP_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${CONTROL_PLANE_SECRET_ARN}" \
            --region "${AWS_REGION}" \
            --query "SecretString" \
            --output text 2>/dev/null || echo "")
        else
          CP_SECRET=""
        fi

        echo "Control plane URL resolved: ${CP_URL:-<not found>}"
        # Write to a shared file so the build phase can read it without re-fetching
        echo "CP_URL=${CP_URL}"     > /tmp/cp_env.sh
        echo "CP_SECRET=${CP_SECRET}" >> /tmp/cp_env.sh

  build:
    commands:
      - echo "==> Cloning repo (branch ${GITHUB_BRANCH:-main})..."
      - git clone --depth 1 --branch "${GITHUB_BRANCH:-main}" "${GITHUB_REPO}" /tmp/repo

      # Capture the exact commit so it appears in logs and failure emails
      - COMMIT_SHA=$(git -C /tmp/repo rev-parse --short HEAD 2>/dev/null || echo "unknown")
      # Single-quote the whole scalar: an unquoted "X: Y" is parsed as a YAML
      # mapping ("X" → "Y"), which is how the previous build failed at line 65
      # with "found subkeys instead". Single quotes preserve `: ` literally.
      - 'echo "Repo commit: ${COMMIT_SHA}"'

      - cd /tmp/repo/infra/terraform/environments/prod

      - echo "==> Terraform init (tenant=${USER_ID}, region=${TENANT_REGION:-$AWS_REGION})..."
      - |
        terraform init \
          -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
          -backend-config="key=tenants/${USER_ID}/terraform.tfstate" \
          -backend-config="region=${TENANT_REGION:-$AWS_REGION}" \
          -backend-config="dynamodb_table=${TERRAFORM_STATE_LOCK_TABLE}" \
          -backend-config="kms_key_id=${TERRAFORM_STATE_KMS_KEY_ARN}" \
          -backend-config="encrypt=true" \
          -reconfigure

      - terraform validate

      - 'echo "==> ACTION=${ACTION:-apply}"'

      - echo "==> Resolving tenant variables..."
      - |
        # Re-fetch control plane creds — env vars exported in pre_build do not survive
        # across CodeBuild phases (each command block runs in a fresh shell).
        source /tmp/cp_env.sh 2>/dev/null || true
        if [ -z "${CP_URL}" ]; then
          CP_URL=$(aws ssm get-parameter \
            --name "/aria/control-plane/${ENVIRONMENT:-prod}/internal-url" \
            --region "${AWS_REGION}" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || echo "")
        fi
        if [ -z "${CP_SECRET}" ] && [ -n "${CONTROL_PLANE_SECRET_ARN}" ]; then
          CP_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${CONTROL_PLANE_SECRET_ARN}" \
            --region "${AWS_REGION}" \
            --query "SecretString" \
            --output text 2>/dev/null || echo "")
        fi

        # ── Resolve shared platform resources ───────────────────────────────
        # These tenant-scope inputs reference platform-level infra (ECR repo,
        # KMS key, heartbeat table, alarm SNS) that lives outside the tenant
        # stack. We resolve them at build time from AWS_ACCOUNT_ID + known
        # names — each can be overridden via a SSM param under
        # /aria/shared/${ENVIRONMENT}/<key> if the deployment uses a custom
        # name later.
        SHARED_PATH="/aria/shared/${ENVIRONMENT:-prod}"

        TENANT_ECR_REPO=$(aws ssm get-parameter --name "${SHARED_PATH}/ecr_repository_url" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aria-evaluator")
        # Use last 6 chars of account ID — matches the convention in
        # environments/prod/terraform.tfvars (bucket_suffix = "194296"). The
        # tenant module concatenates this with the tenant_id, and an S3
        # bucket name has a 63-char ceiling, so anything longer overflows.
        #
        # NOTE: CodeBuild runs commands in /bin/sh (dash), which does NOT
        # support the bash-only ${VAR: -6} negative-offset substring. Use
        # awk for portability.
        ACCOUNT_LAST6=$(printf '%s' "${AWS_ACCOUNT_ID}" | awk '{print substr($0, length-5)}')
        TENANT_BUCKET_SUFFIX=$(aws ssm get-parameter --name "${SHARED_PATH}/bucket_suffix" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "${ACCOUNT_LAST6}")
        TENANT_HEARTBEAT_TABLE_NAME=$(aws ssm get-parameter --name "${SHARED_PATH}/heartbeat_table_name" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "aria-heartbeats")
        TENANT_HEARTBEAT_TABLE_ARN=$(aws ssm get-parameter --name "${SHARED_PATH}/heartbeat_table_arn" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "arn:aws:dynamodb:${AWS_REGION}:${AWS_ACCOUNT_ID}:table/${TENANT_HEARTBEAT_TABLE_NAME}")
        TENANT_KMS_KEY_ARN=$(aws ssm get-parameter --name "${SHARED_PATH}/kms_key_arn" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "arn:aws:kms:${AWS_REGION}:${AWS_ACCOUNT_ID}:alias/aria-control-plane-dynamodb")
        TENANT_ALARM_SNS_TOPIC_ARN=$(aws ssm get-parameter --name "${SHARED_PATH}/alarm_sns_topic_arn" --region "${AWS_REGION}" --query "Parameter.Value" --output text 2>/dev/null \
          || echo "arn:aws:sns:${AWS_REGION}:${AWS_ACCOUNT_ID}:aria-control-plane-provisioner-failures")

        # Echo non-sensitive resolved values for the build log.
        echo "Resolved tenant_ecr_repository_url=${TENANT_ECR_REPO}"
        echo "Resolved tenant_bucket_suffix=${TENANT_BUCKET_SUFFIX}"
        echo "Resolved tenant_heartbeat_table=${TENANT_HEARTBEAT_TABLE_NAME}"
        echo "Resolved tenant_kms_key_arn=${TENANT_KMS_KEY_ARN}"
        echo "Resolved tenant_alarm_sns_topic_arn=${TENANT_ALARM_SNS_TOPIC_ARN}"

        # Collect the var flags once — both apply and destroy take the same set.
        TF_VARS=$(printf '%s ' \
          -var="tenant_id=${USER_ID}" \
          -var="pricing_tier=${PLAN_TYPE}" \
          -var="pricing_track=${PRICING_TRACK:-individual}" \
          -var="aws_region=${TENANT_REGION:-$AWS_REGION}" \
          -var="environment=prod" \
          -var="control_plane_internal_url=${CP_URL}" \
          -var="control_plane_internal_secret=${CP_SECRET}" \
          -var="ecr_repository_url=${TENANT_ECR_REPO}" \
          -var="bucket_suffix=${TENANT_BUCKET_SUFFIX}" \
          -var="heartbeat_table_arn=${TENANT_HEARTBEAT_TABLE_ARN}" \
          -var="heartbeat_table_name=${TENANT_HEARTBEAT_TABLE_NAME}" \
          -var="kms_key_arn=${TENANT_KMS_KEY_ARN}" \
          -var="alarm_sns_topic_arn=${TENANT_ALARM_SNS_TOPIC_ARN}")

        if [ "${ACTION:-apply}" = "destroy" ]; then
          echo "==> Terraform destroy (tenant=${USER_ID})..."
          # eval expands the quoted TF_VARS string so each -var stays its own
          # argument (otherwise the shell passes them as a single mashed token).
          eval terraform destroy -auto-approve $TF_VARS
          echo "==> Tenant ${USER_ID} infrastructure destroyed."
        else
          echo "==> Terraform plan (plan=${PLAN_TYPE}, track=${PRICING_TRACK:-individual})..."
          eval terraform plan $TF_VARS -out=/tmp/tfplan
          echo "==> Terraform apply..."
          terraform apply -auto-approve /tmp/tfplan
          echo "==> Capturing outputs..."
          terraform output -json > /tmp/outputs.json
        fi

  post_build:
    commands:
      - |
        set +e
        INSTANCE_URL=$(jq -r '.cloudfront_domain_name.value // .alb_dns_name.value // empty' /tmp/outputs.json 2>/dev/null)
        BUILD_STATUS=$CODEBUILD_BUILD_SUCCEEDING

        # Surface the full URL as a CodeBuild exported variable so the
        # control-plane can fetch it via BatchGetBuilds.exportedEnvironmentVariables
        # without depending on the curl-to-internal-ALB notification path.
        # Set even on failure (empty string) so the variable is always present
        # — the control-plane treats an empty value as "still unknown".
        if [ -n "$INSTANCE_URL" ]; then
          export TENANT_INSTANCE_URL="https://${INSTANCE_URL}"
        else
          export TENANT_INSTANCE_URL=""
        fi
        echo "TENANT_INSTANCE_URL exported: ${TENANT_INSTANCE_URL}"

        # Re-fetch secrets — each phase is a separate shell in CodeBuild
        CP_URL=$(aws ssm get-parameter \
          --name "/aria/control-plane/${ENVIRONMENT:-prod}/internal-url" \
          --region "${AWS_REGION}" \
          --query "Parameter.Value" \
          --output text 2>/dev/null || echo "")

        if [ -n "${CONTROL_PLANE_SECRET_ARN}" ]; then
          CP_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${CONTROL_PLANE_SECRET_ARN}" \
            --region "${AWS_REGION}" \
            --query "SecretString" \
            --output text 2>/dev/null || echo "")
        else
          CP_SECRET=""
        fi

        # Build the CloudWatch Logs URL for this specific build's stream.
        # Stream name = last segment of CODEBUILD_BUILD_ID after the colon.
        BUILD_STREAM=$(echo "${CODEBUILD_BUILD_ID}" | sed 's/.*://')
        LOG_GROUP_ENCODED=$(echo "/aws/codebuild/${CODEBUILD_BUILD_ARN##*:project/}" | sed 's|/|$252F|g')
        CW_DEEP_LINK="https://console.aws.amazon.com/cloudwatch/home?region=${AWS_REGION}#logsV2:log-groups/log-group/$252Faws$252Fcodebuild$252F${CODEBUILD_BUILD_ARN##*:project/}/log-events/${BUILD_STREAM}"

        # Capture the tail of the build log for the failure payload.
        # The log is written by the CodeBuild agent to the container filesystem.
        TAIL_LOG=$(tail -50 /tmp/build.log 2>/dev/null \
          || grep -i "error\|failed\|exit" /var/log/amazon/ssm/*.log 2>/dev/null | tail -30 \
          || echo "(log not available — open CloudWatch link)")
        # Sanitise for JSON: escape quotes and newlines
        TAIL_LOG_JSON=$(echo "${TAIL_LOG}" | head -c 2000 | python3 -c \
          "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null \
          || echo "\"(log serialisation failed)\"")

        if [ "$BUILD_STATUS" = "1" ] && [ -n "$INSTANCE_URL" ] && [ -n "$CP_URL" ]; then
          echo "==> Provisioning succeeded. Notifying control plane..."
          FULL_URL="https://${INSTANCE_URL}"
          curl -sf -X POST "${CP_URL}/internal/provision/complete" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CP_SECRET}" \
            -d "{\"tenantId\":\"${USER_ID}\",\"instanceUrl\":\"${FULL_URL}\"}" \
            && echo "Control plane notified: ${FULL_URL}" \
            || echo "WARNING: failed to notify control plane (status will update via heartbeat)"
        else
          echo "==> Provisioning FAILED. Notifying control plane with full context..."

          # Rich failure payload — everything support needs in one notification
          FAILURE_PAYLOAD=$(cat <<PAYLOAD
        {
          "tenantId": "${USER_ID}",
          "errorMessage": "CodeBuild provisioning failed (status=${BUILD_STATUS:-unknown})",
          "context": {
            "planType": "${PLAN_TYPE:-unknown}",
            "pricingTrack": "${PRICING_TRACK:-unknown}",
            "region": "${TENANT_REGION:-${AWS_REGION}}",
            "githubRepo": "${GITHUB_REPO:-unknown}",
            "githubBranch": "${GITHUB_BRANCH:-main}",
            "buildId": "${CODEBUILD_BUILD_ID:-unknown}",
            "cloudwatchLogsUrl": "${CW_DEEP_LINK}",
            "logGroupName": "/aws/codebuild/${CODEBUILD_BUILD_ARN##*:project/}",
            "logStreamName": "${BUILD_STREAM}",
            "logTail": ${TAIL_LOG_JSON}
          }
        }
        PAYLOAD
          )

          if [ -n "$CP_URL" ]; then
            curl -sf -X POST "${CP_URL}/internal/provision/failed" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CP_SECRET}" \
              -d "${FAILURE_PAYLOAD}" \
              && echo "Control plane notified of failure" \
              || echo "WARNING: failed to notify control plane of failure (EventBridge SNS email still fires)"
          else
            echo "WARNING: CP_URL empty — cannot notify control plane. EventBridge SNS email will still fire."
          fi
          exit 1
        fi

artifacts:
  files:
    - /tmp/outputs.json
  discard-paths: yes
  name: ProvisioningOutput

cache:
  paths:
    - '/root/.terraform/**/*'
    - '/root/.terraform.d/plugin-cache/**/*'
